version: '3.8'

services:
  # Database Final (PostgreSQL)
  postgres:
    image: postgres:15-alpine
    container_name: jobhunter-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: jobhunter
      POSTGRES_PASSWORD: jobhunter_password
      POSTGRES_DB: jobhunter_prod
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - jobhunter-net

  # Database Bruto (MongoDB)
  mongodb:
    image: mongo:6
    container_name: jobhunter-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
    volumes:
      - mongo-data:/data/db
    networks:
      - jobhunter-net

  # Cache e Fila (Redis)
  redis:
    image: redis:7-alpine
    container_name: jobhunter-redis
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - jobhunter-net

  # Backend API (FastAPI - Serving Layer)
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: jobhunter-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - DATABASE_URL=postgresql+asyncpg://jobhunter:jobhunter_password@postgres:5432/jobhunter_prod
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    env_file:
      - ./apps/backend/.env
    depends_on:
      - postgres
      - redis
    networks:
      - jobhunter-net

  # ETL Worker (Refinery Layer)
  etl-worker:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: jobhunter-etl-worker
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
    environment:
      - MONGO_URI=mongodb://root:rootpassword@mongodb:27017/
      - MONGO_DB_NAME=job_lake
      - DATABASE_URL=postgresql+asyncpg://jobhunter:jobhunter_password@postgres:5432/jobhunter_prod
      - ENVIRONMENT=production
    command: python /app/etl/worker.py
    depends_on:
      - mongodb
      - postgres
    networks:
      - jobhunter-net

  # Scraper Worker (Raw Layer)
  scraper-worker:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: jobhunter-scraper
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
    environment:
      - MONGO_URI=mongodb://root:rootpassword@mongodb:27017/
      - MONGO_DB_NAME=job_lake
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=production
    # The command will change to launch the scrapy process e.g. scrapy crawl my_spider
    command: tail -f /dev/null
    depends_on:
      - mongodb
      - redis
    networks:
      - jobhunter-net

  # Frontend (Next.js)
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: jobhunter-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - NODE_ENV=production
    depends_on:
      - backend
    networks:
      - jobhunter-net

networks:
  jobhunter-net:
    driver: bridge

volumes:
  redis-data:
    driver: local
  postgres-data:
    driver: local
  mongo-data:
    driver: local
